name: Sync upstream NousResearch

on:
  workflow_dispatch:
  schedule:
    # Daily 03:17 UTC. Conflicts fail loudly instead of overwriting zcuss changes.
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zcuss fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync NousResearch main into zcuss main
        run: |
          scripts/sync_upstream.sh --no-tests --push
